<!DOCTYPE html>
<html>

<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>💰 Expense Tracker</h1>
        <p class="subtitle">Track your expenses and manage your money wisely</p>

        <input type="text" id="expenseName" placeholder="Expense Name">

        <input type="number" id="expenseAmount" placeholder="Amount">
        <select id="expenseCategory">

            <option value="Food">🍔 Food</option>

            <option value="Transport">🚌 Transport</option>

            <option value="Education">📚 Education</option>

            <option value="Shopping">🛒 Shopping</option>

            <option value="Entertainment">🎬 Entertainment</option>

            <option value="Health">💊 Health</option>

        </select>
        <input type="number" id="budgetInput" placeholder="Set Monthly Budget">

        <button onclick="setBudget()">
            Set Budget
        </button>

        <button onclick="addExpense()">Add Expense</button>
        <div class="summary">

            <div class="card">
                ...
                Total Expenses
            </div>

            <div class="card">
                ...
                Total Entries
            </div>

            <div class="card">
                ...
                Budget
            </div>

        </div>

        <div class="summary">

            <div class="card">
                ...
                Remaining
            </div>

            <div class="card">
                ...
                Top Category
            </div>

        </div>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div class="chart-container">
            <canvas id="expenseChart"></canvas>
        </div>

        <p id="progressText">0% Used</p>
        <p id="warningMessage"></p>
        <div class="action-buttons">

            <button class="secondary-btn" id="toggleMoneyBtn" onclick="toggleMoneyVisibility()">

                👁 Hide Amounts

            </button>

            <button class="secondary-btn" onclick="exportCSV()">

                📥 Export CSV

            </button>

        </div>

        <ul id="expenseList"></ul>



        <ul id="expenseList"></ul>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>
