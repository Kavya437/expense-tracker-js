<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>💰 Expense Tracker</h1>
        <p class="subtitle">Track your expenses and manage your money wisely</p>

        <input type="text" id="expenseName" placeholder="Expense Name">

        <input type="number" id="expenseAmount" placeholder="Amount">
        <select id="expenseCategory">

            <option value="Food">🍔 Food</option>

            <option value="Transport">🚌 Transport</option>

            <option value="Education">📚 Education</option>

            <option value="Shopping">🛒 Shopping</option>

            <option value="Entertainment">🎬 Entertainment</option>

            <option value="Health">💊 Health</option>

        </select>
        <input type="number" id="budgetInput" placeholder="Set Monthly Budget">

        <button onclick="setBudget()">
            Set Budget
        </button>

        <button onclick="addExpense()">Add Expense</button>
        <div class="summary">

            <div class="card">
                <h3>Total Expenses</h3>
                <p>₹<span id="total">0</span></p>
            </div>

            <div class="card">
                <h3>Total Entries</h3>
                <p><span id="entries">0</span></p>
            </div>

            <div class="card">
                <h3>Budget</h3>
                <p>₹<span id="budget">0</span></p>
            </div>

        </div>

        <div class="summary">

            <div class="card">
                <h3 id="remainingTitle">Remaining</h3>
                <p>₹<span id="remaining">0</span></p>
            </div>

            <div class="card">
                <h3>Top Category</h3>
                <p id="topCategory">None</p>
            </div>

        </div>
        <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
        </div>
        <div id="chartSection" class="chart-container">
            <canvas id="expenseChart"></canvas>
        </div>

        <p id="progressText">0% Used</p>
        <p id="warningMessage"></p>

        <div class="action-buttons">

            <button class="secondary-btn" id="toggleMoneyBtn" onclick="toggleMoneyVisibility()">

                👁 Hide Amounts

            </button>

            <button class="secondary-btn" onclick="exportCSV()">

                📥 Export CSV

            </button>

            <button class="secondary-btn danger-btn" onclick="clearAllExpenses()">

                🗑 Clear All

            </button>

        </div>

        <ul id="expenseList"></ul>



        <ul id="expenseList"></ul>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="script.js"></script>

</body>

</html>
